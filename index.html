<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Park It! — Top-Down Parking Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>PARK <span>IT!</span></h1>
<div id="hud" class="hidden">
  <div class="stat avatar" id="hudAvatar"></div>
  <div class="stat">Level <b id="hudLevel">1</b></div>
  <div class="stat">Mode <b id="hudMode">—</b></div>
  <div class="stat">Time <b id="timer">--</b></div>
  <div class="stat"><svg width="14" height="14" viewBox="0 0 24 24" fill="#ffb02e" style="vertical-align:-2px"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg> <b id="hudStars">0</b></div>
  <div class="stat">Crashes <b id="hudCrashes">0</b></div>
  <div class="stat" id="hudTask"></div>
  <button id="sndBtn" title="Sound on/off (M)"></button>
</div>
<div id="wrap"><canvas id="game" width="960" height="600"></canvas></div>
<script src="game.js"></script>
</body>
</html>

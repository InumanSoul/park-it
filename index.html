<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Park It! — Top-Down Parking Game</title>
<meta name="description" content="Park It! is a top-down parking game where you navigate through challenging levels, avoiding obstacles and mastering tight spaces to become the ultimate parking champion.">
<meta name="author" content="Anderson Fariña (https://inumansoul.com)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<a id="ghLink" href="https://github.com/InumanSoul/park-it" target="_blank" rel="noopener" title="View source on GitHub" aria-label="View source on GitHub">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.4.5 0 5.9 0 12.6c0 5.3 3.4 9.8 8.2 11.4.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.3-1.8-1.3-1.8-1.1-.8 0-.7 0-.7 1.2.1 1.8 1.3 1.8 1.3 1.1 1.9 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.4-5.5-6 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.6 18.3 5 18.3 5c.7 1.6.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 24 12.6C24 5.9 18.6.5 12 .5z"/></svg>
</a>
<h1>PARK <span>IT!</span></h1>
<div id="hud" class="hidden">
  <div class="stat avatar" id="hudAvatar"></div>
  <div class="stat">Level <b id="hudLevel">1</b></div>
  <div class="stat">Mode <b id="hudMode">—</b></div>
  <div class="stat">Time <b id="timer">--</b></div>
  <div class="stat"><svg width="14" height="14" viewBox="0 0 24 24" fill="#ffb02e" style="vertical-align:-2px"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg> <b id="hudStars">0</b></div>
  <div class="stat">Lives <b id="hudLives" class="lives">♥♥♥</b></div>
  <div class="stat" id="hudTask"></div>
  <button id="sndBtn" title="Sound on/off (M)"></button>
</div>
<div id="wrap">
  <canvas id="game" width="960" height="600"></canvas>
  <div id="nameModal" class="hidden">
    <div class="card">
      <label for="nameInput">ENTER YOUR NICKNAME</label>
      <input id="nameInput" maxlength="12" autocomplete="off" spellcheck="false" placeholder="DRIVER">
      <div class="row">
        <button id="namePost">POST SCORE</button>
        <button id="nameSkip" class="ghost">SKIP</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
